<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="{% block meta_description %}Quality Print - Professionelle Druckdienstleistungen für Premium-Qualität{% endblock %}">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="{{ request.base_url }}">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Quality Print - Professionelle Druckdienstleistungen{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Quality Print - Professionelle Druckdienstleistungen für Premium-Qualität{% endblock %}">
    <meta property="og:url" content="{{ request.base_url }}">
    <meta property="og:image" content="{{ request.base_url }}static/images/og-image.png">
    <meta property="og:site_name" content="Quality Print">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Quality Print - Professionelle Druckdienstleistungen{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Quality Print - Professionelle Druckdienstleistungen für Premium-Qualität{% endblock %}">
    <meta name="twitter:image" content="{{ request.base_url }}static/images/twitter-image.png">
    
    <title>{% block title %}Quality Print - Professionelle Druckdienstleistungen{% endblock %}</title>
    
    <!-- ===== STYLESHEETS (Consolidated in style.css) ===== -->
    
    <!-- 1. DESIGN TOKENS (must be first!) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    
    <!-- 2. ALL STYLES (imports all other CSS files in correct order) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Extra CSS per page -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- ===== NAVIGATION ===== -->
    {% include 'components/navbar.html' %}
    
    <!-- ===== MAIN CONTENT ===== -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- ===== FOOTER ===== -->
    {% include 'components/footer.html' %}
    
    <!-- ===== SCRIPTS ===== -->
    <!-- Navigation interactions -->
    <script src="{{ url_for('static', filename='js/navigation.js') }}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
